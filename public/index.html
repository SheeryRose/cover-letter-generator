<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Letter Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Cover Letter Generator</h1>
  <p class="subtitle">Fill in your details and let AI draft the first version.</p>

  <form id="letterForm">
    <div class="input-group">
      <label for="candidateName">Your Name</label>
      <input type="text" id="candidateName" placeholder="Sheery Rose">
    </div>

    <div class="input-group">
      <label for="jobRole">Job Role</label>
      <input type="text" id="jobRole" placeholder="Frontend Developer">
    </div>

    <div class="input-group">
      <label for="company">Target Company</label>
      <input type="text" id="company" placeholder="Prodesk">
    </div>

    <div class="input-group">
      <label for="skills">Key Skills</label>
      <textarea id="skills" rows="3" placeholder="CSS, JavaScript, React, problem solving"></textarea>
    </div>

    <div class="input-group">
      <label for="resume">Upload Resume (optional, PDF)</label>
      <input type="file" id="resume" accept="application/pdf">
    </div>

    <button type="submit" id="generateBtn">Generate Cover Letter</button>
  </form>

  <p id="status" class="status"></p>

  <div class="result-box" id="resultBox" hidden>
    <div class="result-header">
      <h2>Your Cover Letter</h2>
      <button id="copyBtn">Copy to Clipboard</button>
    </div>
    <div id="letterOutput"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
